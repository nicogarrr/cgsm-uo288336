<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGSM - Practica 4.1</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <style>
        #overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 24px;
            text-align: center;
            color: #f8fafc;
            background: radial-gradient(circle at top, rgba(30, 41, 59, 0.95), rgba(2, 6, 23, 0.98));
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            z-index: 1000;
        }

        #startButton {
            border: 0;
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: #020617;
            background-color: #67e8f9;
        }

        #startButton:hover {
            background-color: #a5f3fc;
        }

        #hud {
            position: fixed;
            left: 16px;
            bottom: 16px;
            max-width: 360px;
            padding: 12px 14px;
            color: #e2e8f0;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 12px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.4;
        }

        #hud strong {
            color: #f8fafc;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>Practica 4.1 - Sonido 3D</h1>
        <p>Haz clic para activar el audio y entrar en la escena.</p>
        <button id="startButton" type="button">Iniciar escena</button>
    </div>

    <div id="hud">
        <strong>Controles:</strong> mueve la camara con flechas o W-A-S-D, apunta con el raton a una caja y pulsa espacio para activar o parar su sonido.
    </div>

    <script defer src="dist/prac4-1.js"></script>
</body>
</html>
