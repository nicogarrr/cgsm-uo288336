<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGSM - Practica 1.1</title>
    <style>
        html {
            height: 100%;
        }

        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            display: grid;
            place-items: center;
        }

        .status-panel {
            max-width: 520px;
            padding: 1.25rem 1.5rem;
            border: 1px solid #444;
            border-radius: 0.5rem;
            background-color: #111;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
        }

        #status.ok {
            color: #8cff8c;
        }

        #status.error {
            color: #ff8c8c;
        }
    </style>
</head>
<body>
    <main class="status-panel">
        <h1>WebGL Support Check</h1>
        <p id="status">Checking browser support...</p>
    </main>
    <script defer src="dist/prac1-1.js"></script>
</body>
</html>
