<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGSM - Practica 5.1</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <style>
        body {
            min-height: 100%;
        }

        #shell {
            min-height: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        #panel {
            display: grid;
            gap: 10px;
            padding: 16px;
            background: rgba(15, 23, 42, 0.88);
            border-bottom: 1px solid rgba(148, 163, 184, 0.25);
        }

        #panel h1 {
            margin: 0;
            font-size: 20px;
        }

        #status {
            margin: 0;
            color: #cbd5e1;
            line-height: 1.5;
        }

        #player {
            width: min(100%, 1100px);
            max-height: calc(100vh - 190px);
            margin: 16px auto 24px;
            display: block;
            background: #000000;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(2, 6, 23, 0.45);
        }
    </style>
</head>
<body>
    <div id="shell">
        <section id="panel">
            <h1>Practica 5.1 - Reproductor DASH</h1>
            <p id="status">
                Esta pagina reproduce directamente el manifiesto
                <span class="code">./media/sintel/sintel_final.mpd</span> usando
                <span class="code">dash.js</span>.
            </p>
        </section>

        <video id="player" controls playsinline crossorigin="anonymous"></video>
    </div>

    <script defer src="vendor/dash.all.min.js"></script>
    <script defer src="dist/prac5-1.js"></script>
</body>
</html>
